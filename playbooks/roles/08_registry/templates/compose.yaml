services:
  registry:
    image: registry:3
    volumes:
      - registry:/var/lib/registry
      - ./auth/htpasswd:/auth/htpasswd:ro
      - ./config.yml:/etc/distribution/config.yml:ro
    labels:
      - "traefik.enable=true"
{% if node_type == 'master' %}
      - "traefik.http.routers.registry.rule=Host(`{{registry_sub_domain}}.${DOMAIN}`)"
      - "traefik.http.routers.registry.entrypoints=websecure"
      - "traefik.http.routers.registry.tls=true"
      - "traefik.http.routers.registry.tls.certresolver=letsencrypt"
      - "traefik.http.services.registry.loadbalancer.server.port=5000"
{% elif node_type == 'private_network_node' %}
      - "traefik.http.routers.registry-private.rule=Host(`{{registry_sub_domain}}.${DOMAIN}`)"
      - "traefik.http.routers.registry-private.entrypoints=web"
      - "traefik.http.services.registry-private.loadbalancer.server.port=5000"
{% endif %}

  registry-ui:
    image: konradkleine/docker-registry-frontend:v2
    environment:
      ENV_DOCKER_REGISTRY_HOST: registry
      ENV_DOCKER_REGISTRY_PORT: 5000
    labels:
      - "traefik.enable=true"
{% if node_type == 'master' %}
      - "traefik.http.routers.registry-ui.rule=Host(`{{registry_ui_sub_domain}}.${DOMAIN}`)"
      - "traefik.http.routers.registry-ui.entrypoints=websecure"
      - "traefik.http.routers.registry-ui.tls=true"
      - "traefik.http.routers.registry-ui.tls.certresolver=letsencrypt"
      - "traefik.http.services.registry-ui.loadbalancer.server.port=80"
{% elif node_type == 'private_network_node' %}
      - "traefik.http.routers.registry-ui-private.rule=Host(`{{registry_ui_sub_domain}}.${DOMAIN}`)"
      - "traefik.http.routers.registry-ui-private.entrypoints=web"
      - "traefik.http.services.registry-ui-private.loadbalancer.server.port=80"
{% endif %}
volumes:
  registry:

networks:
  default:
    external: true
    name: ${TRAEFIK_NETWORK}
