services:
  checkmate:
    image: ghcr.io/bluewave-labs/checkmate-backend-mono:v3.5.1
    restart: unless-stopped
    environment:
      - UPTIME_APP_API_BASE_URL=https://{{ checkmate_domain }}.${DOMAIN}/api/v1
      - UPTIME_APP_CLIENT_HOST=https://{{ checkmate_domain }}.${DOMAIN}
      - DB_CONNECTION_STRING=mongodb://${MONGO_USER}:${MONGO_PW}@mongodb:27017/uptime_db?authSource=admin
      - CLIENT_HOST=https://{{ checkmate_domain }}.${DOMAIN}
      - JWT_SECRET={{ checkmate_jwt_secret }}
    depends_on:
      - mongodb
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.checkmate.rule=Host(`{{ checkmate_domain }}.${DOMAIN}`)"
      - "traefik.http.routers.checkmate.entrypoints=websecure"
      - "traefik.http.services.checkmate.loadbalancer.server.port=52345"
      - "traefik.http.routers.checkmate.tls.certresolver=letsencrypt"
    networks:
      - traefik
      - internal

  mongodb:
    image: mongo:7.0.31
    restart: unless-stopped
    command: ["mongod", "--quiet", "--bind_ip_all"]
    volumes:
      - mongo:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PW}
      MONGO_INITDB_DATABASE: uptime_db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 5s
      timeout: 30s
      start_period: 0s
      start_interval: 1s
      retries: 30
    networks:
      - internal

volumes:
  mongo:

networks:
  internal:
    internal: true
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK}
