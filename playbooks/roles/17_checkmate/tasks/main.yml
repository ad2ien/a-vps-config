---
- name: Create /checkmate
  file:
    path: "{{ app_path }}/checkmate"
    state: directory

- name: Copy template files to /srv/checkmate
  template:
    src: "{{ item }}"
    dest: /srv/checkmate/{{ item | replace('.j2', '') }}
    mode: "0644"
  loop:
    - compose.yaml
    - .env.j2
  register: checkmate_config

- name: Stop stack
  community.docker.docker_compose_v2:
    project_src: "{{ app_path }}/checkmate"
    state: absent
  when: checkmate_config.changed

- name: Start stack
  community.docker.docker_compose_v2:
    project_src: "{{ app_path }}/checkmate"
    state: present
