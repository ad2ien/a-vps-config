---
- name: Create dolibarr path
  file:
    path: "{{ app_path }}/{{ tenant }}/dolibarr"
    state: directory
    mode: "0775"

- name: Copy template files to dolibarr
  template:
    src: "{{ item }}"
    dest: "{{ app_path }}/{{ tenant }}/dolibarr/{{ item | replace('.j2', '') }}"
    mode: "0644"
  loop:
    - compose.yaml.j2
    - .env.j2
    - db-backup.sh
  register: dolibarr_config

- name: Create wildcard CNAME DNS record for tenant
  community.general.cloudflare_dns:
    zone: "{{ domain }}"
    record: "*.{{ tenant }}.{{ domain }}"
    type: CNAME
    value: "{{ domain }}"
    proxied: false
    api_token: "{{ cloudflare_api_token }}"

- name: Stop stack
  community.docker.docker_compose_v2:
    project_src: "{{ app_path }}/{{ tenant }}/dolibarr"
    state: absent
  when: dolibarr_config.changed

- name: Start stack
  community.docker.docker_compose_v2:
    project_src: "{{ app_path }}/{{ tenant }}/dolibarr"
    state: present

- name: Schedule database backup
  ansible.builtin.cron:
    name: "Dolibarr database backup"
    minute: "10"
    hour: "1"
    job: "{{ app_path }}/{{ tenant }}/dolibarr/db-backup.sh"
    user: root
