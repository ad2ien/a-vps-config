---
- name: Create n8n path
  file:
    path: "{{ app_path }}/{{ tenant }}/n8n"
    state: directory
    mode: "0775"

- name: Copy template files to n8n
  template:
    src: "{{ item }}"
    dest: "{{ app_path }}/{{ tenant }}/n8n/{{ item | replace('.j2', '') }}"
    mode: "0644"
  loop:
    - compose.yaml.j2
    - .env.j2
  register: n8n_config

- name: Create wildcard CNAME DNS record for tenant
  community.general.cloudflare_dns:
    zone: "{{ domain }}"
    record: "*.{{ tenant }}.{{ domain }}"
    type: CNAME
    value: "{{ domain }}"
    proxied: false
    api_token: "{{ cloudflare_api_token }}"

- name: Stop stack
  community.docker.docker_compose_v2:
    project_src: "{{ app_path }}/{{ tenant }}/n8n"
    state: absent
  when: n8n_config.changed

- name: Start stack
  community.docker.docker_compose_v2:
    project_src: "{{ app_path }}/{{ tenant }}/n8n"
    state: present
