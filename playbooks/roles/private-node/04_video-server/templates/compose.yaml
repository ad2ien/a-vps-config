services:
  mediamtx:
    image: bluenviron/mediamtx:1.19.2
    restart: unless-stopped
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
      - ./certs:/certs
    ports:
      - 127.0.0.1:8322:8322/tcp
      - 8554:8554/tcp
    networks:
      - internal

  shinobi:
    image: "ad2ien/shinobi:latest"
    restart: unless-stopped
    environment:
      - DB_HOST=shinobi-db
      - DB_USER=shinobi
      - DB_PASSWORD=${SHINOBI_DB_PASSWORD}
      - DB_DATABASE=ccio
      - SHINOBI_UPDATE=false
    mem_limit: 256m
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.shinobi.rule=Host(`shinobi.${DOMAIN}`)"
      - "traefik.http.routers.shinobi.entrypoints=websecure"
      - "traefik.http.services.shinobi.loadbalancer.server.port=8080"
      - "traefik.http.routers.shinobi.tls.certresolver=letsencrypt-dns"
    networks:
      - traefik
      - internal

  shinobi-db:
    image: mysql:5.7
    restart: unless-stopped
    volumes:
      - shinoby-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=ccio
      - MYSQL_USER=shinobi
      - MYSQL_PASSWORD=${SHINOBI_DB_PASSWORD}
    networks:
      - internal

volumes:
  shinoby-data:

networks:
  internal:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK}
